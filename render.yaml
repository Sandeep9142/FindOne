services:
  - type: web
    name: findone-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SERVER_URL
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_IMAGE_SIZE_MB
        value: 5
      - key: API_RATE_LIMIT_MAX
        value: 300
      - key: AUTH_RATE_LIMIT_MAX
        value: 20
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
